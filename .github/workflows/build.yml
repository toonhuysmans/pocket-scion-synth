name: build

on:
  push:
    branches:
      - main
      - multi-timbral
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Fetch Pico SDK 2.2.0
        run: |
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init

      - name: Test sensor mathematics
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Isrc \
            src/sensor_math.c tests/test_sensor_math.c \
            -lm -o "$RUNNER_TEMP/test_sensor_math"
          "$RUNNER_TEMP/test_sensor_math"

      - name: Test editor protocol
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Isrc \
            src/editor_protocol.c tests/test_editor_protocol.c \
            -o "$RUNNER_TEMP/test_editor_protocol"
          "$RUNNER_TEMP/test_editor_protocol"

      - name: Build UF2
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload UF2
        uses: actions/upload-artifact@v7
        with:
          name: pocket-scion-synth-uf2
          path: build/pocket_scion_synth.uf2

  editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json
      - run: npm ci
        working-directory: editor
      - run: npm test
        working-directory: editor
      - run: npm run build
        working-directory: editor
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/multi-timbral')
        with:
          path: editor/dist

  deploy-editor:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/multi-timbral')
    needs: editor
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy editor to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
